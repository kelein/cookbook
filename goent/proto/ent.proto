syntax = "proto3";

package example.v1;
// option go_package = "github.com/your/app/api/example/v1;examplev1";
option go_package = "github.com/kelein/cookbook/api/v1;v1";

import "google/protobuf/timestamp.proto";

message User {
  int64 id = 1;
  string name = 2;
  string email = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}
